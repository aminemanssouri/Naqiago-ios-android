<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting to Naqiago App...</title>
    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const type = urlParams.get('type');
        
        if (type === 'recovery' && token) {
            // Try to redirect to app
            const appUrl = `naqiago://reset-password?token=${token}&type=${type}`;
            window.location.href = appUrl;
            
            // Fallback message
            setTimeout(() => {
                document.getElementById('message').innerHTML = 
                    '<p>If the app didn\'t open automatically, please:</p>' +
                    '<ol>' +
                    '<li>Open the Naqiago app manually</li>' +
                    '<li>Go to Login → Forgot Password</li>' +
                    '<li>Use token: <code>' + token.substring(0, 10) + '...</code></li>' +
                    '</ol>';
            }, 2000);
        }
    </script>
</head>
<body>
    <div id="message">
        <h2>Redirecting to Naqiago App...</h2>
        <p>Please wait while we redirect you to the app.</p>
    </div>
</body>
</html>
